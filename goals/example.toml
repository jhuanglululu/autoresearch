# A research goal. Start with:  python -m autoresearch goals/example.toml
# A known id resumes from its checkpoint in state/<id>/; a new id starts fresh
# from the template.
#
# A goal is a self-contained research domain: it pins its own baseline lab
# template and read-only assets, so another goal can target a different domain
# entirely (a TTS model, another language corpus, ...) without touching code.

id       = "example"
template = "templates/example.md"

[experiment]
# Lab template (a uv project) copied to lab/<lab-id>/ when a lab is created.
baseline = "experiments/baseline-lm-zhtw"

# Optional host-side wall-clock kill for a single run, in seconds. Omit to use
# the worker's default (~6h). Uncomment to bound runs more tightly for this goal.
# run_timeout_s = 21600

# The goal's pinned untouchables. The worker resolves these paths into each
# run's run_config.toml [assets]; they are kept read-only on disk. No subagent
# may edit, copy over, or substitute them.
[experiment.assets]
tokenizer = "tokenizer.json"
corpus    = "data/wikipedia-zhtw"
